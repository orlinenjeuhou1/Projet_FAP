api_platform:
    title: "API Travel Paradise"
    version: "1.0.0"
    show_webby: false
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    swagger:
        versions: [3]
        api_keys:
            JWT:
                name: Authorization
                type: header
    formats:                     # ✅ AJOUTE CETTE SECTION
        jsonld: ['application/ld+json']
        json: ['application/json']
        html: ['text/html']

