default:
  suites:
    api:
      contexts:
        - FeatureContext
        - Behat\MinkExtension\Context\MinkContext
      filters:
        tags: "@api"
    admin:
      contexts:
        - FeatureContext
        - Behat\MinkExtension\Context\MinkContext
      filters:
        tags: "@admin"
  extensions:
    Behat\MinkExtension:
      base_url: 'http://localhost:8000'
      sessions:
        default:
          goutte: ~
        javascript:
          selenium2: ~
    Behat\Symfony2Extension: ~
